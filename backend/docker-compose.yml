version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:latest\n    restart: always\n    environment:\n      POSTGRES_USER: your_username\n      POSTGRES_PASSWORD: your_password\n      POSTGRES_DB: your_database\n    healthcheck:\n      test: ["CMD", "pg_isready", "-U", "your_username"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n\n  redis:\n    image: redis:latest\n    restart: always\n    healthcheck:\n      test: ["CMD", "redis-cli", "ping"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\n  nestjs:\n    build:\n      context: .\n      dockerfile: Dockerfile\n    restart: always\n    environment:\n      DATABASE_URL: postgres://your_username:your_password@postgres/your_database\n      REDIS_HOST: redis\n      PORT: 3000\n    depends_on:\n      postgres:\n        condition: service_healthy\n      redis:\n        condition: service_healthy\n    ports:\n      - "3000:3000"\n\nvolumes:\n  postgres_data: